<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Word Search - Echo Puzzles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/terminal.css">
  <link rel="stylesheet" href="/assets/css/wordsearch.css">
</head>

<body>

<div class="container">

  <div class="error-container terminal-window" id="errorPage" style="display: none; padding: 2rem; margin-top: 2rem;">
    <h1 id="errorTitle">SYSTEM ERROR</h1>
    <p id="errorMessage" class="error"></p>
    <hr style="border-color: #333;">
    <address>Web Server at puzzle-apps.vercel.app</address>
    <p><a href="/" class="btn btn-secondary">Return to Home</a></p>
  </div>

  <div class="grid-wrapper" id="gameContent">
    <div class="terminal-window" style="padding: 1rem; display: inline-block;">
      <canvas id="lineCanvas"></canvas>
      <div id="grid" class="grid"></div>
    </div>
    
    <div class="reveal-container terminal-window" id="revealContainer">
      <div class="reveal-title">SEQUENCE INCOMPLETE</div>
      <div class="reveal-code" id="revealCode"></div>
    </div>
    
    <div class="clues-container terminal-window">
      <div class="clues"></div>
    </div>

    <div class="mysterious-overlay" id="mysteriousOverlay">
      <div class="mysterious-message" id="mysteriousMessage"></div>
      <div class="final-reveal" id="finalReveal"></div>
    </div>
  </div>
</div>

<script>window.API_BASE_URL = "{{API_BASE_URL}}";</script>
<script src="/assets/js/wordsearch.js"></script>

</body>
</html>
