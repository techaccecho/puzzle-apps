<!DOCTYPE html>

<html>
<head>
  <title>Word Search POC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/wordsearch.css">
</head>

<body>

<div class="error-container" id="errorPage">
  <h1 id="errorTitle">Error</h1>
  <p id="errorMessage"></p>
  <hr>
  <address>Web Server at puzzle-apps.vercel.app</address>
  <p><a href="/">Return to Home</a></p>
</div>

<div class="grid-wrapper" id="gameContent">
  <canvas id="lineCanvas"></canvas>
  <div id="grid" class="grid"></div>
  <div class="reveal-container" id="revealContainer">
    <div class="reveal-title">SEQUENCE INCOMPLETE</div>
    <div class="reveal-code" id="revealCode"></div>
  </div>
  <div class="mysterious-overlay" id="mysteriousOverlay">
    <div class="mysterious-message" id="mysteriousMessage"></div>
    <div class="final-reveal" id="finalReveal"></div>
  </div>
  <div><p> </p> </div>
  <div class="clues">
  </div>
</div>

<script>window.API_BASE_URL = "{{API_BASE_URL}}";</script>
<script src="/assets/js/wordsearch.js"></script>

</body>
</html>
