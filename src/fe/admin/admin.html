<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Echo Puzzles</title>
    <link rel="stylesheet" href="/assets/css/terminal.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">&larr; Back to Home</a>
        </div>
        <h1>Admin Dashboard</h1>

        <!-- Redirect URLs Section -->
        <div class="section">
            <h2>Redirect URLs</h2>
            <div class="form-group">
                <div>
                    <label for="urlInput">URL</label>
                    <input type="text" id="urlInput" placeholder="https://..." style="width: 300px;">
                </div>
                <div>
                    <label for="typeInput">Type</label>
                    <input type="text" id="typeInput" placeholder="puzzle-type">
                </div>
                <button class="btn" id="saveRedirectBtn" onclick="saveRedirectUrl()">Save URL</button>
                <button class="btn btn-secondary" id="cancelRedirectBtn" onclick="resetRedirectForm()" style="display: none;">Cancel</button>
            </div>
            <div id="redirectStatus" class="status"></div>
            <table id="redirectTable">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>URL</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="redirectList"></tbody>
            </table>
        </div>

        <!-- Service Mappings Section -->
        <div class="section">
            <h2>Service Mappings</h2>
            <div class="form-group">
                <div>
                    <label for="serviceNameInput">Service Name</label>
                    <input type="text" id="serviceNameInput" placeholder="word-search">
                </div>
                <div>
                    <label for="redirectTypeInput">Redirect Type</label>
                    <input type="text" id="redirectTypeInput" placeholder="puzzle-wordsearch">
                </div>
                <button class="btn" id="saveMappingBtn" onclick="saveServiceMapping()">Save Mapping</button>
                <button class="btn btn-secondary" id="cancelMappingBtn" onclick="resetMappingForm()" style="display: none;">Cancel</button>
            </div>
            <div id="mappingStatus" class="status"></div>
            <table id="mappingTable">
                <thead>
                    <tr>
                        <th>Service Name</th>
                        <th>Redirect Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="mappingList"></tbody>
            </table>
        </div>

        <!-- Puzzles Overview Section -->
        <div class="section">
            <h2>Puzzles Overview</h2>
            <div id="puzzleStatus" class="status"></div>
            <table id="puzzleTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="puzzleList"></tbody>
            </table>
            <div style="margin-top: 1rem;">
                <button class="btn btn-secondary" id="prevPuzzleBtn" onclick="loadPuzzles(currentPuzzleCursor, -1)" disabled>Previous</button>
                <button class="btn btn-secondary" id="nextPuzzleBtn" onclick="loadPuzzles(currentPuzzleCursor)">Next</button>
            </div>
        </div>

        <!-- Short URLs Overview Section -->
        <div class="section">
            <h2>Short URLs Overview</h2>
            <div id="shortUrlStatus" class="status"></div>
            <table id="shortUrlTable">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>User</th>
                        <th>Target URL</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody id="shortUrlList"></tbody>
            </table>
        </div>

        <!-- Dictionary Section -->
        <div class="section">
            <h2>Dictionary</h2>
            <div class="form-group">
                <input type="hidden" id="wordIdInput">
                <div>
                    <label for="wordInput">Word</label>
                    <input type="text" id="wordInput" placeholder="EXPRESS">
                </div>
                <div>
                    <label for="questionInput">Question/Clue</label>
                    <input type="text" id="questionInput" placeholder="A fast web framework..." style="width: 400px;">
                </div>
                <button class="btn" id="saveWordBtn" onclick="saveWord()">Save Word</button>
                <button class="btn btn-secondary" id="cancelWordBtn" onclick="resetWordForm()" style="display: none;">Cancel</button>
            </div>
            <div id="dictionaryStatus" class="status"></div>
            <table id="dictionaryTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Word</th>
                        <th>Question</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="dictionaryList"></tbody>
            </table>
            <div style="margin-top: 1rem;">
                <button class="btn btn-secondary" id="prevBtn" onclick="loadDictionary(currentCursor, -1)" disabled>Previous</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="loadDictionary(currentCursor)">Next</button>
            </div>
        </div>
    </div>

    <script>window.API_BASE_URL = "{{API_BASE_URL}}";</script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
